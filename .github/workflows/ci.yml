name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Lint API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: na_porta_orders
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d na_porta_orders"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: na_porta_orders
      DB_SEED_DEMO: true
      ADMIN_EMAIL: admin@na-porta.local
      ADMIN_PASSWORD: Admin@123456
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Prettier check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Bootstrap database
        run: npm run db:bootstrap:prod
