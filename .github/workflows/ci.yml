name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: na_porta_orders
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d na_porta_orders"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      APP_PORT: 8080
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: na_porta_orders
      DB_SCHEMA: public
      DB_CONNECTION_LIMIT: 10
      DB_SYNCHRONIZE: false
      DB_SSL: false
      DB_SEED_DEMO: true
      ADMIN_EMAIL: admin@na-porta.local
      ADMIN_PASSWORD: Admin@123456
      JWT_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_EXPIRES: 45m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGIN: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Prettier check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Bootstrap database
        run: npm run db:bootstrap:prod

  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t na-porta-orders-api:ci .
