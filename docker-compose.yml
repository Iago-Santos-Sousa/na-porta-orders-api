version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: na-porta-orders-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: na_porta_orders
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d na_porta_orders || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: na-porta-orders-api
    build:
      context: ./take-home-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: production
      APP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: na_porta_orders
      DB_SCHEMA: na_porta_orders
      DB_SYNCHRONIZE: 'false'
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      JWT_EXPIRES: 30m
      JWT_REFRESH_EXPIRES: 45m
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
